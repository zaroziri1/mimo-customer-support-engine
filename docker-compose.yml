version: '3.8'

services:
  mimo-support:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - MIMO_API_ENDPOINT=http://your-mimo-server:20128/v1
      - MIMO_MODEL=xmtp/mimo-v2.5-pro
      - MIMO_API_KEY=${MIMO_API_KEY}
    restart: unless-stopped
